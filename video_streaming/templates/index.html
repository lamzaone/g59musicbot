<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Video Player</title>
    <!-- Include HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="{{url_for('static', filename='styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.2.0/socket.io.min.js"></script>
</head>
<body class="">
    <h1>g59 video streaming</h1>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <video id="video" controls></video>
    <script>
        var video = document.getElementById('video');
        var url = "{{url}}";

        if (url !== null && url !== "") {
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED,function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('canplay',function() {
                    video.play();
                });
            }
        } else {
            // If url is None or empty, use the static video
            video.src = "{{url_for('static', filename='video.webm')}}";
            video.addEventListener('canplay', function() {
                video.play();
            });
        }

        var socket = io.connect('http://' + document.domain + ':' + location.port);
        var seeking = false; // Flag to track seeking action
        var playTimeout = null;
        var pauseTimeout = null;

        socket.on('play_video', function() {
            clearTimeout(pauseTimeout);
            if (video.paused && !seeking) {
                playTimeout = setTimeout(function() {
                    video.play();
                }, 100); 
            }
        });

        socket.on('pause_video', function() {
            clearTimeout(playTimeout);
            if (!video.paused && !seeking) {
                pauseTimeout = setTimeout(function() {
                    video.pause();
                }, 100);
            }
        });

        socket.on('seek_video', function(data) {
            if (!seeking) {
                video.currentTime = data.time;
            }
        });
        video.addEventListener('timeupdate', function() {
            if (!seeking) {
                socket.emit('update_video_state', { time: video.currentTime, state: video.paused ? 'paused' : 'playing' });
            }
        });
        video.addEventListener('play', function() {
            clearTimeout(pauseTimeout);
            if (!seeking) {
                socket.emit('play_video');
            }
        });
        video.addEventListener('pause', function() {
            clearTimeout(playTimeout);
            if (!seeking) {
                socket.emit('pause_video');
            }
        });
        video.addEventListener('seeking', function() {
            seeking = true;
            setTimeout(function() {
                seeking = false;
            }, 100); 
        });
        video.addEventListener('seeked', function() {
            socket.emit('seek_video', { time: video.currentTime });
        });
    </script>
</body>
</html>
